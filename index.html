<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCC Grading System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="toast-container"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand"><i class="fa-solid fa-graduation-cap"></i> PCC GRADING</div>
            <button class="btn-icon" id="close-sidebar"><i class="fa-solid fa-chevron-left"></i></button>
        </div>
        <div class="menu-section">
            <label class="menu-label">Active Semester</label>
            <div class="semester-selector">
                <select id="semester-select"></select>
                <button class="btn btn-accent" id="add-semester-btn"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
        <div class="menu-section" id="subjects-section" style="display:none;">
            <label class="menu-label">SUBJECTS <i class="fa-solid fa-chevron-down"></i></label>
            <div id="subject-list"></div>
            <button class="btn btn-outline btn-sm" id="add-subject-btn" style="margin-top:10px; width:100%;">
                <i class="fa-solid fa-plus"></i> Add Subject
            </button>
        </div>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
        <header class="top-bar">
            <button class="mobile-toggle" id="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
            <h2>Dashboard</h2>
            <button class="btn btn-primary" id="add-student-btn" style="display:none;">
                <i class="fa-solid fa-user-plus"></i> <span class="hide-mobile">Add Student</span>
            </button>
        </header>

        <div class="content-area">
            <div id="empty-state" class="empty-state">
                <i class="fa-solid fa-folder-open" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <h3>No Semester Selected</h3>
                <p>Select or create a semester from the sidebar to view records.</p>
            </div>

            <div id="table-section" style="display:none;">
                <div class="dashboard-grid">
                    <div class="card chart-card">
                        <div class="card-header"><h3>Subject Averages</h3></div>
                        <div class="card-body"><canvas id="dashboard-chart"></canvas></div>
                    </div>
                    <div class="card stats-card">
                        <div class="card-header"><h3>Class Summary</h3></div>
                        <div class="stats-body">
                            <div class="stat"><div class="stat-value" id="stat-total-students">0</div><div class="stat-label">Students</div></div>
                            <div class="stat"><div class="stat-value" id="stat-average-class">0</div><div class="stat-label">Class Avg</div></div>
                            <div class="stat"><div class="stat-value" id="stat-pass-rate">0%</div><div class="stat-label">Pass Rate</div></div>
                        </div>
                    </div>
                </div>

                <div class="table-controls">
                    <div class="table-search">
                        <div class="input-group">
                            <i class="fa-solid fa-search"></i>
                            <input type="text" id="search-input" placeholder="Search student name...">
                        </div>
                    </div>
                    <div class="table-filters">
                        <select id="filter-year" class="filter-select"><option value="">Year Level</option></select>
                        <select id="filter-section" class="filter-select"><option value="">Section</option></select>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table id="student-table">
                        <thead><tr id="table-header"></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modals (Hidden by default) -->
    <div class="modal-overlay" id="semester-modal">
        <div class="modal">
            <h3>Add New Semester</h3>
            <input type="text" id="semester-name" placeholder="e.g. 1st Semester 2026">
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn btn-primary" id="save-semester-btn">Save</button>
                <button class="btn btn-outline" data-close="semester-modal">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Other modals (Subject, Student, Edit, Confirm) follow same pattern -->
    <!-- ... [Rest of your modal code here] ... -->

    <script src="app.js"></script>
</body>
</html>
